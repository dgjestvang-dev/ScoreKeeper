<!DOCTYPE html>
<Html>  

    <head>

    </head>
        <meta charset="UTF-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1", viewport-fit=cover>
        
        <title>Score Keeper</title>
        <link rel="stylesheet" href="styles.css">
        <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    </head>


<body>

    <!--Icon definitions-->
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">

        <symbol id="icon-back" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 8 8 12 12 16" />
            <line x1="16" y1="12" x2="8" y2="12" />
        </symbol>
    
    
        <symbol id="icon-shield" viewBox="0 0 24 24" >
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </symbol>

        <symbol id="icon-team" viewBox=" 0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </symbol>

        <symbol id="icon-stats" viewBox="0 0 24 24">
            <path d="M21.21 15.89A10 10 0 1 1 8 2.83" />
            <path d="M22 12A10 10 0 0 0 12 2v10z" />
        </symbol>

        <symbol id="icon-matchday"  viewBox="0 0 24 24">
            <rect height="18" rx="2" ry="2" width="18" x="3" y="4" />
            <line x1="16" x2="16" y1="2" y2="6" />
            <line x1="8" x2="8" y1="2" y2="6" />
            <line x1="3" x2="21" y1="10" y2="10" />
        </symbol>

        <symbol id="icon-play"  viewBox="0 0 24 24">    
            <polygon points="5 3 19 12 5 21 5 3" />
        </symbol>

        <symbol id="icon-stop"  viewBox="0 0 24 24">    
            <rect height="18" rx="2" ry="2" width="18" x="3" y="3" />
        </symbol>

        <symbol id="icon-pluss" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" x2="12" y1="8" y2="16" />
                <line x1="8" x2="16" y1="12" y2="12" />
        </symbol>

        <symbol id="icon-minus" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" />
            <line x1="8" x2="16" y1="12" y2="12" />
        </symbol>  

        <symbol id="icon-save" viewBox="0 0 24 24">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
        </symbol>

        <symbol id="icon-refresh" viewBox="0 0 24 24">
            <polyline points="1 4 1 10 7 10" />
            <polyline points="23 20 23 14 17 14" />
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" />
        </symbol>

        <symbol id="icon-reset" viewBox="0 0 24 24">
            <polyline points="1 4 1 10 7 10" />
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
-        </symbol>


    </svg>


    <!-- Hovedbeholder for appen -->
    <div class="viewport">
        <!-- Telefonramme for å simulere en mobilapp -->
        <div class="phone-frame">
            <div class="screen-bg">
            <!-- Skjermområdet for appen -->
              <div class="screen"> 
                <!-- Navigasjonsstack -->
                 <div class="nav-stack">

                    <!-- Home View -->
                    <section class="view home active" id="home">
                        <h1>Score Keeper</h1>
                        <!-- top spacer -->
                        <div class="spacer"></div>
                        <!-- Navigasjonsknapper -->
                        <div class="home-actions">
                            <button data-nav="signup">Opprett konto</button>
                            <button data-nav="login">Logg inn</button>
                            <button data-nav="main_menu">Main menu</button>
                            <button data-back>Tilbake</button>
                        </div>
                          <!-- Bottom spacer -->
                        <div class="spacer"></div>
                    </section>

                    <!-- Login View -->
                    <section class="view" id="login">
                        <h1>Logg inn</h1>

                        <button data-back class="icon-button">
                             <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                             <use href="#icon-back"></use>
                             </svg>
                             <span class="label">Tilbake</span>
                        </button>
                    </section>

                    <!-- Signup View -->
                    <section class="view" id="signup">
                        <h1>Opprett konto</h1>
                        
                        <button data-back class="icon-button">
                             <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                             <use href="#icon-back"></use>
                             </svg>
                             <span class="label">Tilbake</span>
                        </button>


                    </section>

                    <!-- Main menu-->
                    <section class="view menu" id="main_menu">
                        <h1>Hovedmeny</h1>
                        <div class="menu-panel button-group">
                            <button data-nav="kampdag" class="icon-button">
                                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <use href="#icon-matchday"></use>
                                </svg>
                                <span class="label">Kampdag</span>
                            </button>
                            
                            <button data-nav="mine-lag">
                                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <use href="#icon-team"></use>
                                </svg>
                                <span class="label">Mine lag</span>
                            </button>

                            <button data-nav="motstandere">
                                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <use href="#icon-shield"></use>
                                </svg>
                                <span class="label">Motstandere</span>
                            </button>

                            <button data-nav="statistikk" aria-label="Tilbake">
                                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <use href="#icon-stats"></use>
                                </svg>
                                <span class="label">Statistikk</span>
                            </button>
                      
                    </div>
                        <!-- back button, ikke en del av "buttons" diven som er over som stryrer menyene-->
                        <button data-back class="icon-button icon-only back-button" aria-label="Tilbake">
                             <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                 <use href="#icon-back"></use>
                             </svg>
                             <span class="label">Tilbake</span>
                        </button>


                    </section>
                    
                    <!-- Kampdag menu (nested menu) -->
                    <section class="view menu" id="kampdag">
                        
                        <div class="card">
                            <form class="form">
                                <div class="field">
                                    <label for="match-date">Dato</label>
                                    <input type="date" id="match-date" name="match-date">
                                </div>

                                <div class="field">
                                    <label for="hometeam">Hjemmelag</label>
                                    <select id="home-team" name="home-team"></select>
                                </div>

                                <div class="field">
                                    <label for="awayteam">Bortelag</label>
                                    <select id="away-team" name="away-team"></select>
                                </div>

                                <div class="field">
                                    <label for="gametime">Omgangens lengde</label>
                                    <input type="number" id="gametime" name="gametime" placeholder="35">
                                </div>
                            </form>
                        </div>
                        
                        <div class="menu-panel button-group">
                            <button data-nav="start-kamp" class="icon-button" aria-label="Start kamp">
                                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <use href="#icon-play"></use>
                                </svg>
                                <span class="label">Start kamp</span>
                            </button>
                        </div>                   

                        <!-- back button, ikke en del av "buttons" diven som er over som stryrer menyene-->
                        <button data-back class="icon-button icon-only back-button" aria-label="Tilbake">
                             <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                 <use href="#icon-back"></use>
                             </svg>
                             <span class="label">Tilbake</span>
                        </button>
                    </section>

                        <!-- KAMP VISNING-->
                    
                        <section class="view leaf" id="start-kamp">
                                                        
                            <!-- Innhold-->

                            <!-- REGION 1: SCOREBOARD -->
                            <div class="region scoreboard">
                                <span class="team home">Hjemme</span>
                                <span class="score digital">0-0</span>
                                <span class="team away">Borte</span>
                            </div>

                            <!-- REGION 1.1: GAMEHALF -->
                            <div class="region gamehalf">
                                <span class="label">Omgang:</span> 
                                <span class="gamehalf-value"> 1 </span>
                            </div>

                            <!-- REGION 2: GAME CLOCK -->
                            <div class="region clock">
                                <span class="time digital">35:00</span>
                                
                            </div>

                            <!-- REGION 3: LIVE CONTROL TABLE -->
                            <div class="region controls">
                                
                                <div class="control-row">
                                    <button data-team="home" data-stat="goals" data-action="inc">+</button>
                                    <button data-team="home" data-stat="goals" data-action="dec">-</button>
                                    <span class="label">Mål</span>
                                    <button data-team="away" data-stat="goals" data-action="inc">+</button>
                                    <button data-team="away" data-stat="goals" data-action="dec">-</button>
                                </div>

                                <div class="control-row">
                                    <button data-team="home" data-stat="shots_total" data-action="inc">+</button>
                                    <button data-team="home" data-stat="shots_total" data-action="dec">-</button>
                                    <span class="label">Avsluttninger</span>
                                    <button data-team="away" data-stat="shots_total" data-action="inc">+</button>
                                    <button data-team="away" data-stat="shots_total" data-action="dec">-</button>
                                </div>

                                <div class="control-row">
                                    <button data-team="home" data-stat="shots_target" data-action="inc">+</button>
                                    <button data-team="home" data-stat="shots_target" data-action="dec">-</button>
                                    <span class="label">Skudd på mål</span>
                                    <button data-team="away" data-stat="shots_target" data-action="inc">+</button>
                                    <button data-team="away" data-stat="shots_target" data-action="dec">-</button>
                                </div>

                                <div class="control-row">
                                    <button data-team="home" data-stat="corners" data-action="inc">+</button>
                                    <button data-team="home" data-stat="corners" data-action="dec">-</button>
                                    <span class="label">Corner</span>
                                    <button data-team="away" data-stat="corners" data-action="inc">+</button>
                                    <button data-team="away" data-stat="corners" data-action="dec">-</button>
                                </div>

                                <div class="control-row">
                                    <button data-team="home" data-stat="offside" data-action="inc">+</button>
                                    <button data-team="home" data-stat="offside" data-action="dec">-</button>
                                    <span class="label">Offside</span>
                                    <button data-team="away" data-stat="offside" data-action="inc">+</button>
                                    <button data-team="away" data-stat="offside" data-action="dec">-</button>
                                </div>

                                <div class="control-row">
                                    <button data-team="home" data-stat="yellow_card" data-action="inc">+</button>
                                    <button data-team="home" data-stat="yellow_card" data-action="dec">-</button>
                                    <span class="label">Gult kort</span>
                                    <button data-team="away" data-stat="yellow_card" data-action="inc">+</button>
                                    <button data-team="away" data-stat="yellow_card" data-action="dec">-</button>
                                </div>

                                <div class="control-row">
                                    <button data-team="home" data-stat="red_card" data-action="inc">+</button>
                                    <button data-team="home" data-stat="red_card" data-action="dec">-</button>
                                    <span class="label">Rødt kort</span>
                                    <button data-team="away" data-stat="red_card" data-action="inc">+</button>
                                    <button data-team="away" data-stat="red_card" data-action="dec">-</button>
                                </div>
                            </div>

                            <!-- REGION 4: STATS SUMMARY -->
                            <div class="region summary">
                                
                                <div class="summary-row">
                                    <span data-summary="home-shots_total">0</span>
                                    <span class="label">Avsluttninger</span>
                                    <span data-summary="away-shots_total">0</span>
                                </div>

                                <div class="summary-row">
                                    <span data-summary="home-shots_target">0</span>
                                    <span class="label">Skudd på mål</span>
                                    <span data-summary="away-shots_target">0</span>
                                </div>

                                <div class="summary-row">
                                    <span data-summary="home-corners">0</span>
                                    <span class="label">Corner</span>
                                    <span data-summary="away-corners">0</span>
                                </div>

                                <div class="summary-row">
                                    <span data-summary="home-offside">0</span>
                                    <span class="label">Offside</span>
                                    <span data-summary="away-offside">0</span>
                                </div>

                                <div class="summary-row">
                                    <span data-summary="home-yellow_card">0</span>
                                    <span class="label">Gult kort</span>
                                    <span data-summary="away-yellow_card">0</span>
                                </div>

                                <div class="summary-row">
                                    <span data-summary="home-red_card">0</span>
                                    <span class="label">Rødt kort</span>
                                    <span data-summary="away-red_card">0</span>
                                </div>
                            </div>

                            <!-- REGION 5: MATCH CONTROLS -->
                            <div class="region match-controls">
                                <button id="start-stop-btn" class="primary" aria-label="Start eller stopp kamp">
                                    
                                    <svg class="icon icon-start" viewBox="0 0 24 24" aria-hidden="true">
                                        <use href="#icon-play"></use>
                                    </svg>

                                    <svg class="icon icon-stop" viewBox="0 0 24 24" aria-hidden="true">
                                        <use href="#icon-stop"></use>
                                    </svg>

                                    <span class="label">Start</span>

                                </button>
                                
                                
                                <button id="next-half-btn" class="secondary icon-only" aria-label="Start neste omgang">
                                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                        <use href="#icon-refresh"> </use>
                                    </svg>
                                    <span class="label">start neste omgang</span>
                                </button>

                                <button id="reset-match-btn" class="danger icon-only" aria-label="Start kamp på nytt">
                                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                        <use href="#icon-reset"> </use>
                                    </svg>
                                    <span class="label">Reset kamp</span>
                                </button>
                                
                                <button id="save-match-btn" class="secondary icon-only" aria-label="Lagre og tilbake">
                                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                        <use href="#icon-save"> </use>
                                    </svg>
                                    <span class="label">Lagre og tilbake</span>
                                </button>
                            </div>

                        </section>













                     <!----------------------------------------------------------------------------->   
                    
                    <section class="view menu" id="mine-lag">
                        <h1>Mine lag</h1>

                        <!-- back button -->
                        <button data-back class="icon-button icon-only back-button" aria-label="Tilbake">
                             <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                 <use href="#icon-back"></use>
                             </svg>
                             <span class="label">Tilbake</span>
                        </button>
                    </section>

                    <section class="view menu" id="motstandere">
                        <h1>Motstandere</h1>

                        <!-- back button -->
                        <button data-back class="icon-button icon-only back-button" aria-label="Tilbake">
                             <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                 <use href="#icon-back"></use>
                             </svg>
                             <span class="label">Tilbake</span>
                        </button>
                    </section>

                    <section class="view menu" id="statistikk">
                        <h1>Statistikk</h1>

                        <!-- back button-->
                        <button data-back class="icon-button icon-only back-button" aria-label="Tilbake">
                             <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                                 <use href="#icon-back"></use>
                             </svg>
                             <span class="label">Tilbake</span>
                        </button>
                    </section>



                    </div>
                </div>
            </div>
        </div>
    </div>



    <!-- PLAYER ASSIGN SHEET-->
    <div id="player-assign-sheet" class="player-assign hidden">
        <div class="player-assign-panel">
            <div class="player-assign-title">Who scored?</div>

            <div class="player-assign-list" id="player-assign-list">
            <!-- Player buttons injected here -->
            </div>

            <button class="player-assign-skip" id="player-assign-skip">
            Skip
         </button>
        </div>
    </div>








    <!-- Legg til JavaScript-filen for navigasjon -->
    <script type="module" src="navigation.js"></script>
</body>










</Html>
